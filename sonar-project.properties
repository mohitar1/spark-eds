# SonarQube Project Configuration
# Documentation: https://docs.sonarqube.org/latest/analysis/analysis-parameters/

# =============================================================================
# PROJECT IDENTIFICATION
# =============================================================================
sonar.projectKey=spark-eds
sonar.projectName=Spark EDS Portal
sonar.projectVersion=1.0.0

# =============================================================================
# SERVER CONNECTION
# Update this to your hosted SonarQube instance URL
# =============================================================================
sonar.host.url=https://aem-assets.cq.corp.adobe.com/

# Authentication - reads from SONAR_TOKEN environment variable
# Set with: export SONAR_TOKEN=your_token_here
sonar.login=${env.SONAR_TOKEN}

# =============================================================================
# SOURCE CODE LOCATIONS
# =============================================================================
# Main source directories
sonar.sources=scripts,blocks,cloudflare/src,migration,styles

# Test directories (add when tests exist)
# sonar.tests=tests

# =============================================================================
# EXCLUSIONS
# =============================================================================
# Files and directories to exclude from analysis
sonar.exclusions=\
  **/node_modules/**,\
  **/dist/**,\
  **/build/**,\
  **/*.min.js,\
  **/*.min.css,\
  **/tools/assets-browser/**,\
  **/migration/**,\
  **/*.map,\
  **/coverage/**,\
  **/.wrangler/**

# Duplications exclusions (generated/vendor code)
sonar.cpd.exclusions=\
  **/tools/assets-browser/**,\
  **/*.min.js

# =============================================================================
# LANGUAGE SETTINGS
# =============================================================================
# JavaScript/TypeScript analysis
sonar.javascript.file.suffixes=.js,.jsx
sonar.typescript.file.suffixes=.ts,.tsx

# CSS analysis
sonar.css.file.suffixes=.css

# =============================================================================
# CODE COVERAGE (when available)
# =============================================================================
# Uncomment when you have test coverage reports
# sonar.javascript.lcov.reportPaths=coverage/lcov.info

# =============================================================================
# ENCODING
# =============================================================================
sonar.sourceEncoding=UTF-8

# =============================================================================
# QUALITY GATE
# =============================================================================
# Fail the analysis if quality gate is not met (useful for CI)
# sonar.qualitygate.wait=true

# =============================================================================
# BRANCH ANALYSIS (requires Developer Edition or higher)
# =============================================================================
# sonar.branch.name=${BRANCH_NAME}

