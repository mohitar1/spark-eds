name: Cleanup Branch Workers
on:
  schedule:
    - cron: '0 17 * * 5'  # Friday 10am Pacific (5pm UTC)
  workflow_dispatch:        # allow manual trigger

jobs:
  cleanup:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read   # gh pr list (open PRs) in the cleanup script
    steps:
    - uses: actions/checkout@v6

    - name: Cleanup stale branch workers
      run: cloudflare/scripts/cleanup-branch-workers.sh --delete
      env:
        CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        GH_TOKEN: ${{ github.token }}