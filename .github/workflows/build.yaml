name: Build
on:
  pull_request:
    types: [opened, synchronize, reopened, closed]

jobs:
  test:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-node@v6
      with:
        node-version: 24
    # single npm ci installs both trees (root postinstall recurses into cloudflare/)
    - run: npm ci
    - run: npm test
    - run: npm run lint
    - run: npm test
      working-directory: cloudflare
    - run: npm run lint-ci
      working-directory: cloudflare

  deploy:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    defaults:
      run:
        working-directory: cloudflare
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-node@v6
      with:
        node-version: 24

    - name: Setup deployment
      id: setup
      env:
        HEAD_REF: ${{ github.head_ref }}
      run: |
        # Sanitize branch name like EDS, see @adobe/helix-shared sanitizeName()
        ref=$(node -e 'process.stdout.write((process.argv[1] ?? "").normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/^-|-$/g, ""))' -- "$HEAD_REF")
        sha="${{ github.event.pull_request.head.sha }}"
        git fetch --depth=1 origin "$sha"
        tag="git:${sha::7}"
        subject="$(git log -1 --pretty='%s' "$sha")"
        message="$(echo "${{ github.actor }}: $subject" | cut -c1-100)"
        echo "ref=$ref" >> "$GITHUB_OUTPUT"
        echo "url=https://${ref}.spark.aem.media" >> "$GITHUB_OUTPUT"
        echo "tag=$tag" >> "$GITHUB_OUTPUT"
        echo "message=$message" >> "$GITHUB_OUTPUT"

    - run: npm ci

    - name: Create GitHub deployment
      uses: chrnorm/deployment-action@v2
      id: deployment
      with:
        token: '${{ github.token }}'
        environment: 'Cloudflare: ${{ steps.setup.outputs.ref }}'

    - name: Deploy branch worker
      uses: cloudflare/wrangler-action@v4
      with:
        apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        workingDirectory: cloudflare
        command: >-
          deploy --env branch
          --name "spark-eds-pr-${{ github.event.pull_request.number }}"
          --var "HELIX_ORIGIN:https://${{ steps.setup.outputs.ref }}--spark-eds--mohitar1.aem.page"
          --route "${{ steps.setup.outputs.ref }}.spark.aem.media/*"
          --tag "${{ steps.setup.outputs.tag }}"
          --message "${{ steps.setup.outputs.message }}"

    - name: Update deployment status (success)
      if: success()
      uses: chrnorm/deployment-status@v2
      with:
        token: '${{ github.token }}'
        deployment-id: ${{ steps.deployment.outputs.deployment_id }}
        environment-url: '${{ steps.setup.outputs.url }}'
        state: 'success'

    - name: Update deployment status (failure)
      if: failure()
      uses: chrnorm/deployment-status@v2
      with:
        token: '${{ github.token }}'
        deployment-id: ${{ steps.deployment.outputs.deployment_id }}
        state: 'failure'

  undeploy:
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-node@v6
      with:
        node-version: 24
    - run: npm ci

    - name: Delete branch worker
      uses: cloudflare/wrangler-action@v4
      with:
        apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        workingDirectory: cloudflare
        command: delete --name "spark-eds-pr-${{ github.event.pull_request.number }}" --force