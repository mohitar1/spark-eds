name: Build
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5
    - uses: actions/setup-node@v5
      with:
        node-version: 24
    - run: npm ci
    - run: npm test
    - run: npm run lint

  build-cloudflare:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cloudflare
    steps:
    - uses: actions/checkout@v5
    - uses: actions/setup-node@v5
      with:
        node-version: 24
    - run: npm ci
    - run: npm test
    - run: npm run lint-ci

  # deploy-cloudflare disabled — no CLOUDFLARE_API_TOKEN configured for this repo
  # deploy-cloudflare:
