name: Build
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5
    - uses: actions/setup-node@v5
      with:
        node-version: 24
    - run: npm ci
    - run: npm test
    - run: npm run lint

  build-cloudflare:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cloudflare
    steps:
    - uses: actions/checkout@v5
    - uses: actions/setup-node@v5
      with:
        node-version: 24
    - run: npm ci
    - run: npm test
    - run: npm run lint-ci

  deploy-cloudflare:
    runs-on: ubuntu-latest
    needs: build-cloudflare
    permissions:
      contents: read
      deployments: write
    defaults:
      run:
        working-directory: cloudflare
    steps:
    - uses: actions/checkout@v5
      with:
        # needed for deploy.sh to check PR/branch for cloudflare changes
        fetch-depth: 0
    - run: npm ci
    - run: npm run deploy -- --ci ${{ github.ref_name }}
      id: deploy
      env:
        CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    - name: Create GitHub deployment
      uses: chrnorm/deployment-action@v2
      id: deployment
      with:
        token: '${{ github.token }}'
        environment: 'Cloudflare: ${{ steps.deploy.outputs.tag }}'
        environment-url: '${{ steps.deploy.outputs.url }}'
    - name: Update deployment status (success)
      uses: chrnorm/deployment-status@v2
      with:
        token: '${{ github.token }}'
        environment-url: ${{ steps.deployment.outputs.environment_url }}
        deployment-id: ${{ steps.deployment.outputs.deployment_id }}
        state: 'success'
