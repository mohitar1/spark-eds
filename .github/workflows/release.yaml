name: Release
on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    defaults:
      run:
        working-directory: cloudflare
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-node@v6
      with:
        node-version: 24

    - name: Setup deployment
      id: setup
      run: |
        sha="${GITHUB_SHA}"
        tag="git:${sha::7}"
        subject="$(git log -1 --pretty='%s' "$sha")"
        message="$(echo "${{ github.actor }}: $subject" | cut -c1-100)"
        echo "tag=$tag" >> "$GITHUB_OUTPUT"
        echo "message=$message" >> "$GITHUB_OUTPUT"

    - run: npm ci

    - name: Create GitHub deployment
      uses: chrnorm/deployment-action@v2
      id: deployment
      with:
        token: '${{ github.token }}'
        environment: 'Production'

    - name: Deploy to production
      uses: cloudflare/wrangler-action@v4
      with:
        apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        workingDirectory: cloudflare
        command: >-
          deploy --env production
          --tag "${{ steps.setup.outputs.tag }}"
          --message "${{ steps.setup.outputs.message }}"

    - name: Update deployment status (success)
      if: success()
      uses: chrnorm/deployment-status@v2
      with:
        token: '${{ github.token }}'
        deployment-id: ${{ steps.deployment.outputs.deployment_id }}
        environment-url: 'https://spark.aem.media'
        state: 'success'

    - name: Update deployment status (failure)
      if: failure()
      uses: chrnorm/deployment-status@v2
      with:
        token: '${{ github.token }}'
        deployment-id: ${{ steps.deployment.outputs.deployment_id }}
        state: 'failure'

    # TODO (deferred): Slack notify on prod deploy result; post-deploy smoke test vs the prod URL.