# configure worker name and Cloudflare account
name = "spark-eds"
account_id = "5950b56d4c83856bae7035a7b9e7ce99"
main = "src/index.js"
compatibility_date = "2025-08-16"

workers_dev = false

# Top-level bindings used by `wrangler dev` (no --env) and the local
# schema-setup script. Per-env overrides live under [env.*] below.
d1_databases = [
  { binding = "USER_LOGINS", database_name = "spark-user-logins", database_id = "3db42334-a8ba-48cc-b5bd-84f7e1b04eb2" },
  { binding = "AUDIT_EVENTS", database_name = "spark-audit-events", database_id = "3db42334-a8ba-48cc-b5bd-84f7e1b04eb2" },
  { binding = "SEARCH_EVENTS", database_name = "spark-search-events", database_id = "3db42334-a8ba-48cc-b5bd-84f7e1b04eb2" },
]

[observability.logs]
enabled = true

# ======================================================================
# environment for production (main branch)
# ======================================================================
[env.production]
name = "spark-eds-production"

routes = [
  { pattern = "spark.aem.media/*", zone_name = "spark.aem.media" }
]

kv_namespaces = [
  { binding = "AUTH_TOKENS", id = "36672f6acf244f80855367c1322110d5" },
]

secrets_store_secrets = [
  { store_id = "a6f677643a894c5c99d08a280e61e605", binding = "COOKIE_SECRET", secret_name = "SPARK_COOKIE_SECRET" },
  { store_id = "a6f677643a894c5c99d08a280e61e605", binding = "HELIX_ORIGIN_AUTHENTICATION", secret_name = "SPARK_HELIX_ORIGIN_AUTHENTICATION" },
  { store_id = "a6f677643a894c5c99d08a280e61e605", binding = "DM_CLIENT_ID", secret_name = "SPARK_DM_CLIENT_ID" },
  { store_id = "a6f677643a894c5c99d08a280e61e605", binding = "DM_CLIENT_SECRET", secret_name = "SPARK_DM_CLIENT_SECRET" },
]

# NOTE: all three bindings currently point at the same database_id (3db42334-...).
# This is almost certainly a bug — three logical DBs sharing one physical DB will
# cross-contaminate tables. Replace AUDIT_EVENTS/SEARCH_EVENTS ids with their own.
d1_databases = [
  { binding = "USER_LOGINS", database_name = "spark-user-logins", database_id = "3db42334-a8ba-48cc-b5bd-84f7e1b04eb2" },
  { binding = "AUDIT_EVENTS", database_name = "spark-audit-events", database_id = "3db42334-a8ba-48cc-b5bd-84f7e1b04eb2" },
  { binding = "SEARCH_EVENTS", database_name = "spark-search-events", database_id = "3db42334-a8ba-48cc-b5bd-84f7e1b04eb2" },
]

# NOTE: if changing vars, update the branch env below too
[env.production.vars]
HELIX_ORIGIN = "https://main--spark-eds--mohitar1.aem.live"
AEM_ENV_ID = "p203220-e2129061"
HELIX_PUSH_INVALIDATION = "disabled"
SQIDS_ALPHABET = "8gGQeDOJsS069Pod4mU2BKWRXjpiThLkZEHCantwuV7IrcqfAzMbN3vx1YlF5y"
DEBUG_HTTP_DM_SEARCH = "true"
MICROSOFT_ENTRA_TENANT_ID = "983cbc50-8ad1-4dde-b705-7c80477a4186"
MICROSOFT_ENTRA_CLIENT_ID = "93e6431f-2f57-4612-96c8-1464640b4280"
MICROSOFT_ENTRA_JWKS_URL = "https://login.microsoftonline.com/common/discovery/keys"
SESSION_COOKIE_EXPIRATION = "6h"
# Stub vars for features not used in this demo
DOMAIN_URL = ""
SMTP_HOST = ""
SMTP_PORT = ""
SMTP_FROM_NAME = ""
SMTP_FROM_EMAIL = ""
ANALYTICS_ACCOUNT_ID = ""

