# configure worker name and Cloudflare account
name = "spark-eds"
account_id = "5950b56d4c83856bae7035a7b9e7ce99"

main = "src/index.js"
compatibility_date = "2025-08-16"

workers_dev = true
preview_urls = true

[observability.logs]
enabled = true

[vars]
HELIX_ORIGIN = "https://main--spark-eds--mohitar1.aem.live"
AEM_ENV_ID = "p203220-e2129061"



HELIX_PUSH_INVALIDATION = "disabled"

SQIDS_ALPHABET = "8gGQeDOJsS069Pod4mU2BKWRXjpiThLkZEHCantwuV7IrcqfAzMbN3vx1YlF5y"

DEBUG_HTTP_DM_SEARCH = "true"

MICROSOFT_ENTRA_TENANT_ID = "983cbc50-8ad1-4dde-b705-7c80477a4186"
MICROSOFT_ENTRA_CLIENT_ID = "93e6431f-2f57-4612-96c8-1464640b4280"
MICROSOFT_ENTRA_JWKS_URL = "https://login.microsoftonline.com/common/discovery/keys"

SESSION_COOKIE_EXPIRATION = "6h"

# Stub vars for features not used in this demo
FADEL_ORIGIN = ""
DOMAIN_URL = ""
SMTP_HOST = ""
SMTP_PORT = ""
SMTP_FROM_NAME = ""
SMTP_FROM_EMAIL = ""
ANALYTICS_ACCOUNT_ID = ""

# Secrets (SPARK secret store)
[[secrets_store_secrets]]
store_id = "a6f677643a894c5c99d08a280e61e605"
binding = "COOKIE_SECRET"
secret_name = "SPARK_COOKIE_SECRET"

[[secrets_store_secrets]]
store_id = "a6f677643a894c5c99d08a280e61e605"
binding = "HELIX_ORIGIN_AUTHENTICATION"
secret_name = "SPARK_HELIX_ORIGIN_AUTHENTICATION"

[[secrets_store_secrets]]
store_id = "a6f677643a894c5c99d08a280e61e605"
binding = "DM_CLIENT_ID"
secret_name = "SPARK_DM_CLIENT_ID"

[[secrets_store_secrets]]
store_id = "a6f677643a894c5c99d08a280e61e605"
binding = "DM_CLIENT_SECRET"
secret_name = "SPARK_DM_CLIENT_SECRET"

[[kv_namespaces]]
binding = "AUTH_TOKENS"
id = "a87b67da2f294dc8a7ea5ea6332f2ba"

# Per-user notifications store (notifications API: src/api/notifications.js).
# Local `wrangler dev` auto-creates a local KV store and ignores `id`.
# Before deploying, create the remote namespace and replace the placeholder id:
#   npx wrangler kv namespace create MESSAGES
[[kv_namespaces]]
binding = "MESSAGES"
id = "00000000000000000000000000000000"

# Local dev uses .wrangler/state/v3/d1/ (see scripts/local-d1-setup.sh).
# Create the remote database with: npx wrangler d1 create spark-user-logins
[[d1_databases]]
binding = "USER_LOGINS"
database_name = "spark-user-logins"
database_id = "00000000-0000-0000-0000-000000000001"

# Asset activity audit log (report-asset-activity).
# Create the remote database with: npx wrangler d1 create spark-audit-events
[[d1_databases]]
binding = "AUDIT_EVENTS"
database_name = "spark-audit-events"
database_id = "00000000-0000-0000-0000-000000000002"

# Search events log (report-searches).
# Create the remote database with: npx wrangler d1 create spark-search-events
[[d1_databases]]
binding = "SEARCH_EVENTS"
database_name = "spark-search-events"
database_id = "00000000-0000-0000-0000-000000000003"

# Search/download analytics (report-searches).
# Create with: npx wrangler analytics-engine dataset create spark_analytics
[[analytics_engine_datasets]]
binding = "SPARK_ANALYTICS_ENGINE"
dataset = "spark_analytics"
